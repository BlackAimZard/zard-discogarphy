<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN">
<html lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZARD DISCOGRAPHY</title>
<script type="text/javascript">
// 1. Hàm kiểm tra màn hình lúc vừa vào web
function initFrameset() {
    var screenWidth = window.innerWidth || document.documentElement.clientWidth;
    var fs = document.getElementById('masterFrameset');
    if (screenWidth <= 800) {
        fs.cols = "0, *"; // Điện thoại: Ép menu ẩn đi (0px)
    } else {
        fs.cols = "150, *"; // PC: Để menu 150px như cũ
    }
}

// 2. Hàm bật/tắt menu tuyệt đối (không bị lỗi giật giật khi kéo PC)
function toggleMenuTuyetDoi() {
    var fs = document.getElementById('masterFrameset');
    var leftWidth = parseInt(fs.cols.split(',')[0]);
    if (leftWidth > 0) {
        fs.cols = "0, *"; // Đang mở -> Chém về 0
    } else {
        fs.cols = "150, *"; // Đang đóng -> Mở ra đúng 150px
    }
}

// Lắng nghe sự kiện lúc tải trang và lúc thay đổi kích thước cửa sổ
window.onload = initFrameset;
window.onresize = initFrameset;
</script>
</head>

<frameset id="masterFrameset" cols="150,*">
 <frame src="menu.html" name="left">
 <frame src="profile.html" name="right">
</frameset>
</html>
