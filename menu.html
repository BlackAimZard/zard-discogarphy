<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Menu</title>
<style type="text/css">
/* Base Reset */
h2, ul, li { margin: 0; padding: 0; outline: 0; }
ul { list-style: none; margin-top: 15px; }

/* Global Typography */
body { background-color: #FFFFFF; font-size: 16px; font-family: "Times New Roman", "Meiryo", "MS PGothic", "Hiragino Sans", "Osaka", "Noto Sans JP", sans-serif; }

/* Thêm style cho link ở menu */
a { text-decoration: none; color: blue; }
a:hover { color: red; text-decoration: underline; }
li { margin-bottom: 8px; }
</style>

<script type="text/javascript">
    // Báo ra ngoài index.html đóng menu lại
    function autoClose() {
        if (typeof parent.closeMenuOnMobile === 'function') {
            parent.closeMenuOnMobile();
        }
    }
</script>
</head>
<body>
<b>INDEX</b>
<ul>
 <li><a href="profile.html" target="right" onclick="autoClose()">Profile</a></li>
 <li><a href="single.html" target="right" onclick="autoClose()">Single</a></li>
 <li><a href="album.html" target="right" onclick="autoClose()">Album</a></li>
 <li><a href="dvd.html" target="right" onclick="autoClose()">DVD</a></li>
 <li><a href="bluray.html" target="right" onclick="autoClose()">Blu-ray</a></li>
 <li><a href="book.html" target="right" onclick="autoClose()">Book</a></li>
 <li><a href="other.html" target="right" onclick="autoClose()">Other</a></li>
</ul>
</body>
</html>
