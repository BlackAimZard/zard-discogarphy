<button id="mBtn" style="display:none; position:fixed; bottom:20px; right:20px; z-index:9999; padding:10px 15px; background:#003399; color:#fff; border:none; border-radius:5px; font-size:16px; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.3);">☰ Menu</button>
<script>
    var btn = document.getElementById('mBtn');
    btn.onclick = function() { window.parent.postMessage('toggle', '*'); }; // Gửi lệnh đóng/mở lên cha
    window.addEventListener('message', function(e) {
        if (e.data === 'show') btn.style.display = 'block';
        if (e.data === 'hide') btn.style.display = 'none';
    });
