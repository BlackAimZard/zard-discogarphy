<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN">
<html lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZARD DISCOGRAPHY</title>

<script type="text/javascript">
    var isMenuOpen = false;
    var currentMode = "unknown";

    function checkLayout() {
        var parentWidth = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
        var frameset = document.getElementById('mainFrameset');
        var leftFrame = document.getElementById('leftFrame');
        var rightFrame = document.getElementById('rightFrame');

        if (parentWidth < 800) {
            if (currentMode !== "mobile") {
                currentMode = "mobile";
                isMenuOpen = false;
                leftFrame.noResize = true;
                rightFrame.noResize = true;
                frameset.cols = ""; 
                frameset.cols = "0,*"; 
            }
            tellChild('show'); // Nhắn file con hiện nút
        } else {
            if (currentMode !== "desktop") {
                currentMode = "desktop";
                isMenuOpen = false;
                leftFrame.noResize = false;
                rightFrame.noResize = false;
                frameset.cols = ""; 
                frameset.cols = "150,*"; 
            }
            tellChild('hide'); // Nhắn file con ẩn nút
        }
    }

    function toggleMenu() {
        var parentWidth = window.innerWidth || document.documentElement.clientWidth;
        if (parentWidth < 800) {
            isMenuOpen = !isMenuOpen;
            var frameset = document.getElementById('mainFrameset');
            frameset.cols = ""; 
            frameset.cols = isMenuOpen ? "150,*" : "0,*";
        }
    }

    // Gửi tín hiệu xuyên màng bảo mật xuống file con
    function tellChild(msg) {
        var rightFrame = document.getElementById('rightFrame');
        if(rightFrame && rightFrame.contentWindow) {
            rightFrame.contentWindow.postMessage(msg, '*');
        }
    }

    // Lắng nghe tín hiệu từ các file con gửi lên
    window.addEventListener('message', function(e) {
        if (e.data === 'toggle') {
            toggleMenu(); // Con bảo bấm nút -> Cha mở menu
        }
        if (e.data === 'load') {
            var parentWidth = window.innerWidth || document.documentElement.clientWidth;
            // Ở mobile, nếu click link load trang mới -> Cha tự xếp gọn menu lại
            if (parentWidth < 800 && isMenuOpen) {
                isMenuOpen = false;
                document.getElementById('mainFrameset').cols = "0,*";
            }
            checkLayout(); 
        }
    });

    window.onresize = checkLayout;
</script>
</head>

<frameset cols="150,*" id="mainFrameset" onload="checkLayout()">
 <frame src="menu.html" name="left" id="leftFrame">
 <frame src="profile.html" name="right" id="rightFrame">
</frameset>
</html>
